services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: contentforge
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  backend:
    build:
      context: ./contentforge
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started

  worker:
    build:
      context: ./contentforge
      dockerfile: Dockerfile
    # concurrency=1: each fork loads SD into RAM; default 10 causes OOM (SIGKILL) on CPU/Docker.
    command: celery -A tasks.celery_app:app worker --loglevel=info --concurrency=1
    # Larger shm reduces OOM/SIGKILL during SD VAE decode on Docker Desktop (raise if jobs still die).
    shm_size: "4gb"
    restart: unless-stopped
    env_file: .env
    environment:
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
    volumes:
      - ./data:/app/data
      - ./models/sd15:/models/sd15:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

  # Optional: HTTPS tunnel to backend for Instagram/TikTok media URLs.
  # Use a reserved ngrok domain (dashboard → Domains) so the URL stays stable for TikTok/Meta verification.
  # Start: docker compose --profile ngrok up -d
  # .env: NGROK_AUTHTOKEN, NGROK_DOMAIN (e.g. myapp.ngrok-free.app), NGROK_LOCAL_API_URL=http://ngrok:4040
  ngrok:
    image: ngrok/ngrok:latest
    profiles:
      - ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: ["http", "--domain=${NGROK_DOMAIN}", "backend:8000"]
    depends_on:
      - backend

volumes:
  mysql_data:
  ollama_data:
